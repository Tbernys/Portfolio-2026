<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tom Bernys | Portfolio</title>

  <!-- Import map MUST appear before any module scripts -->
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.175.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.175.0/examples/jsm/"
    }
  }
  </script>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@700&family=Inter:ital,wght@0,100..900;1,100..900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">

  <!-- Favicon: inline SVG with TB initials -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%23F5F0EB'/><text x='50' y='72' font-family='sans-serif' font-size='52' font-weight='700' text-anchor='middle' fill='%23000000'>TB</text></svg>">

  <!-- SEO -->
  <meta name="description" content="Tom Bernys — Monteur Vidéo &amp; Motion Designer freelance. Direction artistique, post-production et motion design.">

  <!-- Open Graph -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="Tom Bernys | Portfolio">
  <meta property="og:description" content="Tom Bernys — Monteur Vidéo &amp; Motion Designer freelance. Direction artistique, post-production et motion design.">
  <meta property="og:image" content="og-image.jpg">

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Tom Bernys | Portfolio">
  <meta name="twitter:description" content="Tom Bernys — Monteur Vidéo &amp; Motion Designer freelance. Direction artistique, post-production et motion design.">
  <meta name="twitter:image" content="og-image.jpg">

  <style>
    :root {
      --color-bg: #000000;
      --color-text: #F5F0EB;
      --color-accent: #D4C5B2;
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: var(--color-bg);
      color: var(--color-text);
      font-family: 'Inter', sans-serif;
      overflow-x: hidden;
    }

    #canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
    }

    main {
      position: relative;
      z-index: 1;
      pointer-events: none;
    }

    main a,
    main button,
    main form,
    main input,
    main textarea {
      pointer-events: auto;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      clip-path: inset(50%);
      white-space: nowrap;
      border: 0;
    }

    /* Hero: fill the viewport, center the visible content */
    #hero {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }

    #hero h1 {
      font-family: 'Comfortaa', cursive;
      font-size: clamp(3rem, 8vw, 7rem);
      font-weight: 700;
      color: var(--color-text);
      letter-spacing: -0.02em;
      line-height: 1.1;
    }

    #hero .subtitle {
      font-family: 'Inter', sans-serif;
      font-size: clamp(1rem, 2.5vw, 1.5rem);
      font-weight: 300;
      color: var(--color-accent);
      margin-top: 1rem;
      letter-spacing: 0.04em;
    }

    /* Placeholder scroll space for future phases */
    #clients,
    #projects,
    #contact {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>

  <main lang="fr">
    <section id="hero" data-lang="fr" aria-label="Hero">
      <h1>Tom Bernys</h1>
      <p class="subtitle">Monteur Vidéo &amp; Motion Designer</p>
    </section>

    <section id="clients" data-lang="fr" aria-label="Clients">
      <h2 class="sr-only">Clients</h2>
    </section>

    <section id="projects" data-lang="fr" aria-label="Projets">
      <h2 class="sr-only">Projets</h2>
    </section>

    <section id="contact" data-lang="fr" aria-label="Contact">
      <h2 class="sr-only">Contact</h2>
    </section>
  </main>

  <script type="module">
    import * as THREE from 'three';

    console.log('[Phase 1] Three.js r' + THREE.REVISION + ' loaded via import map');

    const canvas = document.getElementById('canvas');
    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(40, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.z = 5;

    // Phase 1 test geometry — rotating cube proves import map resolves correctly
    const geometry = new THREE.BoxGeometry(1, 1, 1);
    const material = new THREE.MeshStandardMaterial({ color: 0xF5F0EB });
    const cube = new THREE.Mesh(geometry, material);
    scene.add(cube);

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
    scene.add(ambientLight);

    const directionalLight = new THREE.DirectionalLight(0xffffff, 1.5);
    directionalLight.position.set(5, 5, 5);
    scene.add(directionalLight);

    function animate() {
      requestAnimationFrame(animate);
      cube.rotation.x += 0.005;
      cube.rotation.y += 0.005;
      renderer.render(scene, camera);
    }

    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
