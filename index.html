<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Import map MUST appear before any module scripts -->

    }
  }
  </script>

  <style>
    :root {
      --color-bg: #000000;
      --color-text: #F5F0EB;
      --color-accent: #D4C5B2;
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: var(--color-bg);
      color: var(--color-text);
      font-family: 'Inter', sans-serif;
      overflow-x: hidden;
    }

    #canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
    }

    main {
      position: relative;
      z-index: 1;
      pointer-events: none;
    }

    main a,
    main button,
    main form,
    main input,
    main textarea {
      pointer-events: auto;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      clip-path: inset(50%);
      white-space: nowrap;
      border: 0;
    }

    /* Hero: fill the viewport, center the visible content */
    #hero {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }

    #hero h1 {
      font-family: 'Comfortaa', cursive;
      font-size: clamp(3rem, 8vw, 7rem);
      font-weight: 700;
      color: var(--color-text);
      letter-spacing: -0.02em;
      line-height: 1.1;
    }

    #hero .subtitle {
      font-family: 'Inter', sans-serif;
      font-size: clamp(1rem, 2.5vw, 1.5rem);
      font-weight: 300;
      color: var(--color-accent);
      margin-top: 1rem;
      letter-spacing: 0.04em;
    }

    /* Placeholder scroll space for future phases */
    #clients,
    #projects,
    #contact {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>

  <main lang="fr">
    <section id="hero" data-lang="fr" aria-label="Hero">
      <h1>Tom Bernys</h1>
      <p class="subtitle">Monteur Vidéo &amp; Motion Designer</p>
    </section>

    <section id="clients" data-lang="fr" aria-label="Clients">
      <h2 class="sr-only">Clients</h2>
    </section>

    <section id="projects" data-lang="fr" aria-label="Projets">
      <h2 class="sr-only">Projets</h2>
    </section>

    <section id="contact" data-lang="fr" aria-label="Contact">
      <h2 class="sr-only">Contact</h2>
    </section>
  </main>

  <script type="module">
    import * as THREE from 'three';
    import { getGPUTier } from 'detect-gpu';

    // ─── Module-level state ───────────────────────────────────────────────────
    let gpuTier = 1;
    let renderer = null;
    let scene = null;
    let camera = null;
    let rafId = null;
    let contextLossFallbackTimer = null;

    // ─── detectTier() ─────────────────────────────────────────────────────────
    async function detectTier() {
      try {
        const result = await getGPUTier();
        return result.tier ?? 1;
      } catch {
        return 1;
      }
    }

    // ─── initRenderer() ───────────────────────────────────────────────────────
    function initRenderer() {
      const canvas = document.getElementById('canvas');
      renderer = new THREE.WebGLRenderer({
        canvas,
        antialias: gpuTier >= 2,
        alpha: false,
      });
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      renderer.setSize(window.innerWidth, window.innerHeight);
    }

    // ─── initScene() ──────────────────────────────────────────────────────────
    // Designed to be re-callable on context restore.
    function initScene() {
      scene = new THREE.Scene();
      camera = new THREE.PerspectiveCamera(
        40,
        window.innerWidth / window.innerHeight,
        0.1,
        100
      );
      camera.position.z = 5;

      // Placeholder ambient light — Phase 3 hero scene will add full lighting rig
      const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
      scene.add(ambientLight);

      // Expose on window for debugging (remove in Phase 7)
      window.scene = scene;
      window.camera = camera;
    }

    // ─── RAF loop ─────────────────────────────────────────────────────────────
    function startRAFLoop() {
      if (rafId !== null) return;
      function loop() {
        rafId = requestAnimationFrame(loop);
        renderer.render(scene, camera);
      }
      rafId = requestAnimationFrame(loop);
    }

    function stopRAFLoop() {
      cancelAnimationFrame(rafId);
      rafId = null;
    }

    // ─── Visibility guard ─────────────────────────────────────────────────────
    document.addEventListener('visibilitychange', () => {
      if (document.hidden) {
        stopRAFLoop();
      } else {
        startRAFLoop();
      }
    });

    // ─── Context loss / restore handlers ──────────────────────────────────────
    // NOTE: Do NOT call preventDefault on contextlost — Three.js r175 handles it internally.
    // iOS Safari edge case: webglcontextrestored may never fire when backgrounded.
    // A 3-second reload fallback covers that scenario.

    function registerContextHandlers() {
      const canvas = document.getElementById('canvas');

      canvas.addEventListener('webglcontextlost', () => {
        stopRAFLoop();
        // 3-second reload fallback for iOS Safari context loss edge case
        contextLossFallbackTimer = setTimeout(() => {
          window.location.reload();
        }, 3000);
      });

      canvas.addEventListener('webglcontextrestored', () => {
        clearTimeout(contextLossFallbackTimer);
        initScene();
        startRAFLoop();
      });
    }

    // ─── Resize handler ───────────────────────────────────────────────────────
    // Does NOT create new render targets — Phase 3 will add renderTarget.setSize() calls here.
    window.addEventListener('resize', () => {
      const w = window.innerWidth;
      const h = window.innerHeight;
      camera.aspect = w / h;
      camera.updateProjectionMatrix();
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      renderer.setSize(w, h);
    });

    // ─── Debug helpers (uncomment for Phase 7 testing) ────────────────────────

    // Simulates a WebGL context loss/restore cycle.
    // function simulateContextLoss() {
    //   const ext = renderer.getContext().getExtension('WEBGL_lose_context');
    //   ext.loseContext();
    //   setTimeout(() => ext.restoreContext(), 1000);
    // }
    // Uncomment to test: simulateContextLoss()

    // Verifies that 5 resize events do not increase GPU texture count.
    // function checkResizeLeaks() {
    //   const before = renderer.info.memory.textures;
    //   for (let i = 0; i < 5; i++) {
    //     window.dispatchEvent(new Event('resize'));
    //   }
    //   const after = renderer.info.memory.textures;
    //   console.assert(after === before, `Resize texture leak: ${before} → ${after}`);
    //   console.log('[checkResizeLeaks] textures before:', before, '| after:', after);
    // }
    // Uncomment to test: checkResizeLeaks()

    // ─── Bootstrap ────────────────────────────────────────────────────────────
    async function main() {
      gpuTier = await detectTier();
      initRenderer();
      registerContextHandlers(); // Must be registered BEFORE startRAFLoop()
      initScene();
      startRAFLoop();

      // Expose on window for debugging (remove in Phase 7)
      window.renderer = renderer;
      window.gpuTier = gpuTier;

      console.log('[Phase 2] GPU tier:', gpuTier, '| Three.js r' + THREE.REVISION);
    }

    main();
  </script>
</body>
</html>
