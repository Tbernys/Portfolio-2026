    // ═══════════════════════════════════════════════════════════════════════════
    // CUSTOM BLOOM PIPELINE (NOT UnrealBloomPass)
    // ═══════════════════════════════════════════════════════════════════════════

    const bloomExtractFrag = `
      precision highp float;
      varying vec2 vUv;
      uniform sampler2D uScene;
      void main() {
        vec3 c = texture2D(uScene, vUv).rgb;
        vec3 bright = max(vec3(0.0), c - 0.35) * c;
        gl_FragColor = vec4(bright, 1.0);
      }
    `;

    const bloomBlurFrag = `
      precision highp float;
      varying vec2 vUv;
      uniform sampler2D uTexture;
      uniform vec2 uDirection;
      uniform vec2 uResolution;
      void main() {
        vec2 texel = uDirection / uResolution;
        vec3 result = vec3(0.0);
        result += texture2D(uTexture, vUv - texel * 4.0).rgb * 0.016;
        result += texture2D(uTexture, vUv - texel * 2.0).rgb * 0.054;
        result += texture2D(uTexture, vUv - texel * 1.0).rgb * 0.122;
        result += texture2D(uTexture, vUv).rgb * 0.227;
        result += texture2D(uTexture, vUv + texel * 1.0).rgb * 0.122;
        result += texture2D(uTexture, vUv + texel * 2.0).rgb * 0.054;
        result += texture2D(uTexture, vUv + texel * 4.0).rgb * 0.016;
        // Normalize: 0.016+0.054+0.122+0.227+0.122+0.054+0.016 = 0.611
        // We also add the 0.195 taps:
        result += texture2D(uTexture, vUv - texel * 1.5).rgb * 0.195;
        result += texture2D(uTexture, vUv + texel * 1.5).rgb * 0.195;
        gl_FragColor = vec4(result, 1.0);
      }
    `;

    const bloomCompositeFrag = `
      precision highp float;
      varying vec2 vUv;
      uniform sampler2D uScene;
      uniform sampler2D uBloom0;
      uniform sampler2D uBloom1;
      uniform sampler2D uBloom2;
      uniform float uBoost;
      uniform int uLevels;
      void main() {
        vec3 c = texture2D(uScene, vUv).rgb;
        vec3 b0 = texture2D(uBloom0, vUv).rgb;
        vec3 b1 = texture2D(uBloom1, vUv).rgb;
        vec3 bloom = c + b0 * 0.3 + b1 * 0.5;
        if (uLevels > 2) {
          vec3 b2 = texture2D(uBloom2, vUv).rgb;
          bloom += b2 * 0.8;
        }
        bloom *= uBoost;

        // Page border vignette — darkens edges of viewport
        vec2 vc = vUv - 0.5;
        float vignette = 1.0 - dot(vc, vc) * 1.8;
        vignette = clamp(vignette, 0.0, 1.0);
        vignette = smoothstep(0.0, 0.6, vignette);
        bloom *= vignette;

        gl_FragColor = vec4(bloom, 1.0);
      }
    `;

    function createBloomRT(w, h) {
      return new THREE.WebGLRenderTarget(w, h, {
        type: THREE.HalfFloatType,
        minFilter: THREE.LinearFilter,
        magFilter: THREE.LinearFilter,
      });
    }

    let bloomLevels;

    function initBloom(w, h) {
      // Dispose old bloom RTs
      for (const rt of bloomRTs) { if (rt) rt.dispose(); }
      bloomRTs = [];

      bloomLevels = isMobile ? 2 : 3;
      const sizes = [
        [Math.floor(w / 4), Math.floor(h / 4)],
        [Math.floor(w / 8), Math.floor(h / 8)],
        [Math.floor(w / 16), Math.floor(h / 16)],
      ];

      // For each level: extract RT + 2 blur RTs (H + V)
      for (let i = 0; i < bloomLevels; i++) {
        const [bw, bh] = sizes[i];
        bloomRTs.push(createBloomRT(bw, bh)); // blur ping
        bloomRTs.push(createBloomRT(bw, bh)); // blur pong
      }

      // Extract material
      bloomMaterials.extract = new THREE.ShaderMaterial({
        vertexShader: fluidVert,
        fragmentShader: bloomExtractFrag,
        uniforms: { uScene: { value: null } },
        depthTest: false, depthWrite: false,
      });

      // Blur material (reused with different uniforms)
      bloomMaterials.blur = new THREE.ShaderMaterial({
        vertexShader: fluidVert,
        fragmentShader: bloomBlurFrag,
        uniforms: {
          uTexture: { value: null },
          uDirection: { value: new THREE.Vector2(1, 0) },
          uResolution: { value: new THREE.Vector2(w, h) },
        },
        depthTest: false, depthWrite: false,
      });

      // Composite material
      bloomMaterials.composite = new THREE.ShaderMaterial({
        vertexShader: fluidVert,
        fragmentShader: bloomCompositeFrag,
        uniforms: {
          uScene: { value: null },
          uBloom0: { value: null },
          uBloom1: { value: null },
          uBloom2: { value: null },
          uBoost: { value: isMobile ? 1.5 : 1.15 },
          uLevels: { value: bloomLevels },
        },
        depthTest: false, depthWrite: false,
      });
    }

    function runBloom() {
      const w = window.innerWidth;
      const h = window.innerHeight;
      const sizes = [
        [Math.floor(w / 4), Math.floor(h / 4)],
        [Math.floor(w / 8), Math.floor(h / 8)],
        [Math.floor(w / 16), Math.floor(h / 16)],
      ];

      // Extract bright pixels from sceneRT
      bloomMaterials.extract.uniforms.uScene.value = sceneRT.texture;
      fluidQuad.material = bloomMaterials.extract;
      renderer.setRenderTarget(bloomRTs[0]);
      renderer.render(fluidScene, fluidCamera);

      // For each level: H-blur then V-blur
      for (let i = 0; i < bloomLevels; i++) {
        const [bw, bh] = sizes[i];
        const pingIdx = i * 2;
        const pongIdx = i * 2 + 1;

        const blur = bloomMaterials.blur;

        // If level > 0, downsample: render extract result into this level's RT first
        if (i > 0) {
          // Copy from the previous level's final V-blur (ping RT) as starting point
          blur.uniforms.uTexture.value = bloomRTs[(i - 1) * 2].texture;
          blur.uniforms.uDirection.value.set(0, 0);
          blur.uniforms.uResolution.value.set(bw, bh);
          fluidQuad.material = blur;
          renderer.setRenderTarget(bloomRTs[pingIdx]);
          renderer.render(fluidScene, fluidCamera);
        }

        // H-blur
        blur.uniforms.uTexture.value = bloomRTs[pingIdx].texture;
        blur.uniforms.uDirection.value.set(2, 0);
        blur.uniforms.uResolution.value.set(bw, bh);
        fluidQuad.material = blur;
        renderer.setRenderTarget(bloomRTs[pongIdx]);
        renderer.render(fluidScene, fluidCamera);

        // V-blur
        blur.uniforms.uTexture.value = bloomRTs[pongIdx].texture;
        blur.uniforms.uDirection.value.set(0, 2);
        fluidQuad.material = blur;
        renderer.setRenderTarget(bloomRTs[pingIdx]);
        renderer.render(fluidScene, fluidCamera);
      }

      // Composite: combine scene + bloom levels
      const comp = bloomMaterials.composite;
      comp.uniforms.uScene.value = sceneRT.texture;
      comp.uniforms.uBloom0.value = bloomRTs[0].texture;
      comp.uniforms.uBloom1.value = bloomRTs[2].texture;
      if (bloomLevels > 2) {
        comp.uniforms.uBloom2.value = bloomRTs[4].texture;
      }
      fluidQuad.material = comp;
      renderer.setRenderTarget(null);
      renderer.render(fluidScene, fluidCamera);
    }

    // ═══════════════════════════════════════════════════════════════════════════
    // SCENE SETUP
    // ═══════════════════════════════════════════════════════════════════════════

    function initRenderer() {
      const canvas = document.getElementById('canvas');
      renderer = new THREE.WebGLRenderer({
        canvas,
        antialias: !isMobile,
        alpha: false,
      });
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, maxDPR));
      renderer.setSize(window.innerWidth, window.innerHeight);
    }

    function initScene() {
      scene = new THREE.Scene();
      scene.background = new THREE.Color(0x000000);

      const aspect = window.innerWidth / window.innerHeight;
      const fov = isMobile ? 65 : (aspect < 0.8 ? 55 : 40);
      camera = new THREE.PerspectiveCamera(fov, aspect, 0.1, 100);
      camera.position.z = 7;
    }

    function setupEnvMap() {
      const pmremGenerator = new THREE.PMREMGenerator(renderer);
      const envTexture = pmremGenerator.fromScene(new RoomEnvironment()).texture;
      scene.environment = envTexture;
      pmremGenerator.dispose();
    }

    function initRenderTargets() {
      const w = window.innerWidth;
      const h = window.innerHeight;
      const dpr = Math.min(window.devicePixelRatio, maxDPR);
      const rw = Math.floor(w * dpr);
      const rh = Math.floor(h * dpr);

      backgroundRT = new THREE.WebGLRenderTarget(rw, rh, {
        type: THREE.HalfFloatType,
        minFilter: THREE.LinearFilter,
        magFilter: THREE.LinearFilter,
      });

      sceneRT = new THREE.WebGLRenderTarget(rw, rh, {
        type: THREE.HalfFloatType,
        minFilter: THREE.LinearFilter,
        magFilter: THREE.LinearFilter,
      });
    }

    function buildGlassText(font) {
      if (glassGroup) {
        scene.remove(glassGroup);
        if (glassMesh) glassMesh.geometry.dispose();
        if (glassSubMesh) glassSubMesh.geometry.dispose();
      }

      // Main title — thicker depth for solid glass feel
      const geometry = new TextGeometry('Tom Bernys', {
        font,
        size: 2.0,
        depth: 0.5,
        curveSegments: 20,
        bevelEnabled: true,
        bevelThickness: 0.06,
        bevelSize: 0.04,
        bevelSegments: 8,
      });
      geometry.computeBoundingBox();
      geometry.center();

      // Subtitle
      const subGeometry = new TextGeometry('Videaste & Motion Designer', {
        font,
        size: 0.55,
        depth: 0.3,
        curveSegments: 20,
        bevelEnabled: true,
        bevelThickness: 0.04,
        bevelSize: 0.03,
        bevelSegments: 8,
      });
      subGeometry.computeBoundingBox();
      subGeometry.center();

      const noiseTex = createNoiseTexture();
      const dpr = Math.min(window.devicePixelRatio, maxDPR);

      glassMaterial = new THREE.ShaderMaterial({
        vertexShader: glassVert,
        fragmentShader: glassFrag,
        uniforms: {
          uBackground: { value: null },
          uFluid: { value: null },
          uNoise: { value: noiseTex },
          uEnvMap: { value: null },
          uResolution: { value: new THREE.Vector2(
            window.innerWidth * dpr,
            window.innerHeight * dpr
          ) },
          uMousePos: { value: new THREE.Vector2(0.5, 0.5) },
          uMouseVelocity: { value: new THREE.Vector2(0, 0) },
          uRoughness: { value: isMobile ? 0.0 : 0.1 },
          uTime: { value: 0 },
        },
        transparent: true,
        depthWrite: false,
        side: THREE.FrontSide, // Only render front faces — hides internal edges
      });

      glassMesh = new THREE.Mesh(geometry, glassMaterial);
      glassSubMesh = new THREE.Mesh(subGeometry, glassMaterial);

      // Scale to ~65% viewport width
      const fov = camera.fov;
      const dist = camera.position.z - 3;
      const visibleWidth = 2 * dist * Math.tan((fov / 2) * Math.PI / 180);
      const targetWidth = visibleWidth * 0.75;
      const bboxWidth = geometry.boundingBox.max.x - geometry.boundingBox.min.x;
      const scale = targetWidth / bboxWidth;
      const finalScale = isMobile ? scale * 0.62 : scale;

      glassMesh.scale.setScalar(finalScale);
      glassSubMesh.scale.setScalar(finalScale);

      // Position subtitle below main title
      const mainHeight = (geometry.boundingBox.max.y - geometry.boundingBox.min.y) * finalScale;
      glassSubMesh.position.y = -mainHeight * 0.75;

      glassGroup = new THREE.Group();
      glassGroup.add(glassMesh);
      glassGroup.add(glassSubMesh);
      glassGroup.position.z = 3;
      glassGroup.renderOrder = 10;
      glassMesh.renderOrder = 10;
      glassSubMesh.renderOrder = 10;
      scene.add(glassGroup);

      // CubeCamera for reflections (captured once)
      cubeCamera = new THREE.CubeCamera(0.1, 100, new THREE.WebGLCubeRenderTarget(256, {
        type: THREE.HalfFloatType,
      }));
      scene.add(cubeCamera);
    }

    // ═══════════════════════════════════════════════════════════════════════════
    // QUATERNION ROTATION (per spec)
    // ═══════════════════════════════════════════════════════════════════════════

    const autoSpinQuat = new THREE.Quaternion();
    const hoverQuat = new THREE.Quaternion();
    const tempEuler = new THREE.Euler();

    // Tilt angles (clamped, no full rotation)
    let tiltX = 0; // up/down
    let tiltY = 0; // left/right
    const MAX_TILT_X = 1.0;  // ~57 degrees max
    const MAX_TILT_Y = 1.3;  // ~75 degrees max

    function updateRotation(dt) {
      if (!glassGroup) return;

      // Mouse → tilt velocity (no spin, just inclination)
      const dx = smoothMouseX - prevMouseX;
      const dy = smoothMouseY - prevMouseY;
      const sensitivity = isMobile ? 0.15 : 0.07;
      hoverVelX -= dy * sensitivity;
      hoverVelY += dx * sensitivity;

      // Clamp velocity
      hoverVelX = Math.max(-0.6, Math.min(0.6, hoverVelX));
      hoverVelY = Math.max(-0.6, Math.min(0.6, hoverVelY));

      // Lighter friction — keeps momentum longer
      const friction = Math.pow(0.5, dt);
      hoverVelX *= friction;
      hoverVelY *= friction;

      // Accumulate tilt with clamping (no full rotation)
      tiltX += hoverVelX * dt;
      tiltY += hoverVelY * dt;

      // Gentle auto-sway so it's not static
      const autoSwayY = Math.sin(elapsed * 0.3) * 0.06;
      const autoSwayX = Math.sin(elapsed * 0.2 + 1.0) * 0.03;

      // Clamp total tilt
      tiltX = Math.max(-MAX_TILT_X, Math.min(MAX_TILT_X, tiltX));
      tiltY = Math.max(-MAX_TILT_Y, Math.min(MAX_TILT_Y, tiltY));

      // Spring back to center
      tiltX *= Math.pow(0.96, dt * 60);
      tiltY *= Math.pow(0.96, dt * 60);

      // Apply as euler rotation (tilt only, never full spin)
      glassGroup.rotation.x = tiltX + autoSwayX;
      glassGroup.rotation.y = tiltY + autoSwayY;
      glassGroup.rotation.z = 0;

      // Vertical float
      glassGroup.position.y = Math.sin(elapsed * 0.4) * 0.06;
    }

    // ═══════════════════════════════════════════════════════════════════════════
    // RAF LOOP + RENDER PIPELINE
    // ═══════════════════════════════════════════════════════════════════════════

    let sceneReady = false;

    function startRAFLoop() {
      if (rafId !== null) return;
      lastTime = performance.now() / 1000;

      function loop(now) {
        rafId = requestAnimationFrame(loop);



        const t = now / 1000;
        const dt = Math.min(t - lastTime, 0.05); // cap delta
        lastTime = t;
        elapsed += dt;

        if (!sceneReady) {
          renderer.render(scene, camera);
          return;
        }

        // 1. Smooth mouse + velocity
        const smooth = 0.1;
        smoothMouseX += (mouseX - smoothMouseX) * smooth;
        smoothMouseY += (mouseY - smoothMouseY) * smooth;
        mouseVelX = smoothMouseX - prevMouseX;
        mouseVelY = smoothMouseY - prevMouseY;

        // 2. Update glass uniforms
        if (glassMaterial) {
          glassMaterial.uniforms.uMousePos.value.set(
            smoothMouseX / window.innerWidth,
            1.0 - smoothMouseY / window.innerHeight
          );
          glassMaterial.uniforms.uMouseVelocity.value.set(mouseVelX / window.innerWidth, mouseVelY / window.innerHeight);
          glassMaterial.uniforms.uTime.value = elapsed;
          glassMaterial.uniforms.uFluid.value = fluidA.texture;
          glassMaterial.uniforms.uBackground.value = backgroundRT.texture;
        }

        // 3. Pointer tracking for fluid
        pointerAccumX += mouseVelX * 0.001;
        pointerAccumY += mouseVelY * 0.001;

        // 4. Fluid passes
        stepFluid(dt);

        // 5. Update tile uniforms
        if (tilesMesh) {
          tilesMesh.material.uniforms.uTime.value = elapsed;
          tilesMesh.material.uniforms.uFluid.value = fluidA.texture;
          tilesMesh.material.uniforms.uMouseUv.value.set(smoothMouseX / window.innerWidth, 1.0 - smoothMouseY / window.innerHeight);
        }

        // 5b. Rotation
        updateRotation(dt);

        prevMouseX = smoothMouseX;
        prevMouseY = smoothMouseY;

        // 6. Capture cubemap ONCE (without glass visible)
        if (!envCaptured && cubeCamera && glassGroup) {
          glassGroup.visible = false;
          cubeCamera.position.copy(glassGroup.position);
          cubeCamera.update(renderer, scene);
          glassMaterial.uniforms.uEnvMap.value = cubeCamera.renderTarget.texture;
          glassGroup.visible = true;
          envCaptured = true;
        }

        // 7. Render background (without glass) -> backgroundRT
        if (glassGroup) glassGroup.visible = false;
        renderer.setRenderTarget(backgroundRT);
        renderer.render(scene, camera);
        if (glassGroup) glassGroup.visible = true;

        // 8. Render full scene -> sceneRT
        renderer.setRenderTarget(sceneRT);
        renderer.render(scene, camera);

        // 9. Bloom composite -> screen
        runBloom();
      }

      rafId = requestAnimationFrame(loop);
    }

    function stopRAFLoop() {
      cancelAnimationFrame(rafId);
      rafId = null;
    }

    // ─── Visibility guard ─────────────────────────────────────────────────────
    document.addEventListener('visibilitychange', () => {
      if (document.hidden) {
        stopRAFLoop();
      } else {
        startRAFLoop();
      }
    });

    // ─── Context loss / restore handlers ──────────────────────────────────────
    function registerContextHandlers() {
      const canvas = document.getElementById('canvas');

      canvas.addEventListener('webglcontextlost', () => {
        stopRAFLoop();
        contextLossFallbackTimer = setTimeout(() => {
          window.location.reload();
        }, 3000);
      });

      canvas.addEventListener('webglcontextrestored', () => {
        clearTimeout(contextLossFallbackTimer);
        sceneReady = false;
        envCaptured = false;
        initScene();
        setupEnvMap();
        setupLighting();
        initFluidSim();
        initRenderTargets();
        const noiseTex = createNoiseTexture();
        const tiles = generateQuadTree(isMobile);
        buildTiles(tiles, noiseTex);
        // buildCornerLinks(tiles);
        if (loadedFont) buildGlassText(loadedFont);
        buildBehindText();
        initBloom(window.innerWidth, window.innerHeight);
        sceneReady = true;
        startRAFLoop();
      });
    }

    // ─── Resize handler ───────────────────────────────────────────────────────
    let _lastResizeW = window.innerWidth;
    window.addEventListener('resize', () => {
      const w = window.innerWidth;
      const h = window.innerHeight;

      // iOS Safari: address bar hide/show only changes height, not width.
      // Ignore these height-only resizes to prevent Three.js zoom glitch.
      const widthChanged = w !== _lastResizeW;
      _lastResizeW = w;
      if (!widthChanged && window.matchMedia('(max-width: 767px)').matches) return;

      const aspect = w / h;

      camera.aspect = aspect;
      camera.fov = isMobile ? 65 : (aspect < 0.8 ? 55 : 40);
      camera.updateProjectionMatrix();
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, maxDPR));
      renderer.setSize(w, h);

      // Update render targets
      const dpr = Math.min(window.devicePixelRatio, maxDPR);
      const rw = Math.floor(w * dpr);
      const rh = Math.floor(h * dpr);

      if (backgroundRT) { backgroundRT.dispose(); backgroundRT = new THREE.WebGLRenderTarget(rw, rh, { type: THREE.HalfFloatType, minFilter: THREE.LinearFilter, magFilter: THREE.LinearFilter }); }
      if (sceneRT) { sceneRT.dispose(); sceneRT = new THREE.WebGLRenderTarget(rw, rh, { type: THREE.HalfFloatType, minFilter: THREE.LinearFilter, magFilter: THREE.LinearFilter }); }

      // Rebuild bloom at new size
      if (bloomMaterials.extract) initBloom(w, h);

      // Update glass resolution
      if (glassMaterial) {
        glassMaterial.uniforms.uResolution.value.set(w * dpr, h * dpr);
      }
    });

    // ─── Mouse / Touch events ─────────────────────────────────────────────────
    window.addEventListener('mousemove', (e) => {
      mouseX = e.clientX;
      mouseY = e.clientY;
    });

    window.addEventListener('click', () => {
      hoverVelY += 0.03;
    });

    // Touch handlers: canvas-scoped passive listeners (no preventDefault — mobile scroll must work)
    const canvasEl = document.getElementById('canvas');
    canvasEl.addEventListener('touchmove', (e) => {
      const touch = e.touches[0];
      mouseX = touch.clientX;
      mouseY = touch.clientY;
    }, { passive: true });

    canvasEl.addEventListener('touchend', () => {
      hoverVelY += 0.03;
    }, { passive: true });

    // ─── Loading screen ───────────────────────────────────────────────────────

    const GLYPHS = '01!@#$%^&*<>{}[]|\\/?~_+=';

    function runGlitchReveal() {
      const chars = document.querySelectorAll('.loader-char');
      const stagger = 150;
      const cycleDuration = 800;
      const cycleInterval = 50;

      return new Promise(resolve => {
        let completed = 0;

        chars.forEach((el, i) => {
          const target = el.dataset.char;
          if (target === ' ') {
            el.innerHTML = '&nbsp;';
            completed++;
            if (completed === chars.length) resolve();
            return;
          }

          setTimeout(() => {
            const interval = setInterval(() => {
              el.textContent = GLYPHS[Math.floor(Math.random() * GLYPHS.length)];
            }, cycleInterval);

            setTimeout(() => {
              clearInterval(interval);
              el.textContent = target;
              completed++;
              if (completed === chars.length) resolve();
            }, cycleDuration);
          }, i * stagger);
        });
      });
    }

    function initLoadingScreen(tier) {
      const loader = document.getElementById('loader');

      if (tier >= 2) {
        loader.classList.add('has-scanline', 'has-grain');
      }

      const revealDone = runGlitchReveal();

      progressTween = gsap.to('.loader-progress-bar', {
        width: '90%',
        duration: 4.5,
        ease: 'power1.out',
      });

      window._progressTween = progressTween;

      return revealDone;
    }

    function transition() {
      const loader = document.getElementById('loader');
      if (!loader) return;

      if (window._progressTween) {
        window._progressTween.kill();
        window._progressTween = null;
      }

      const bar = document.querySelector('.loader-progress-bar');
      if (bar) bar.style.width = '100%';

      loader.classList.add('dissolving');

      // Smooth fade out
      loader.style.transition = 'opacity 0.8s ease-out';
      loader.style.opacity = '0';

      setTimeout(() => {
        if (loader.parentNode) loader.parentNode.removeChild(loader);
      }, 900);

      // Animate 3D text: start zoomed in, dezoom to final position
      if (glassGroup) {
        const finalZ = 3;
        const finalScaleVal = 1;

        // Start zoomed in
        glassGroup.position.z = finalZ + 2;
        glassGroup.scale.setScalar(1.6);

        // Animate to final position
        const startTime = performance.now();
        const duration = 2400; // ms

        function easeOutCubic(t) {
          return 1 - Math.pow(1 - t, 3);
        }

        function animateEntry() {
          const t = Math.min((performance.now() - startTime) / duration, 1);
          const e = easeOutCubic(t);

          glassGroup.position.z = (finalZ + 2) + (finalZ - (finalZ + 2)) * e;
          glassGroup.scale.setScalar(1.6 + (finalScaleVal - 1.6) * e);

          if (t < 1) requestAnimationFrame(animateEntry);
          else entranceComplete = true;
        }
        requestAnimationFrame(animateEntry);
      }

    }

    // ─── Projects Showcase ──────────────────────────────────────────────────
    const VIMEO_PAID = false; // Tom: set to true if Vimeo Starter+ plan

    const PROJECTS = [
      { id: '1186226529', title: 'Les athl\u00e8tes Arkema', role: 'Montage \u00b7 Motion design', client: 'Arkema' },
      { id: '1202331392', hash: '05c45a24cb', title: 'Game of Thrones Legends', role: 'Assistant réalisateur · Montage', client: 'Zynga' },
      { id: '1202328641', title: 'Tour de France', role: 'Montage', client: 'Intermarch\u00e9' },
      { id: '1202332180', hash: '8f0312f32f', title: 'Coupe du Monde 2026', role: 'Motion design', client: 'Coca-Cola × Panini' },
      { id: '1202314978', title: 'Championnat d\u2019Europe', role: 'Motion design', client: 'Arkema' },
      { id: '1202326084', title: 'Tour d’Italie de Juliette Labous', role: 'Montage', client: 'Bostik' },
      { id: '1202333032', hash: '4440862aa4', title: 'Game of Thrones Legends 2', role: 'Assistant r\u00e9alisateur \u00b7 Montage', client: 'Zynga' },
      { id: '1186215550', title: 'Pr\u00e9sentation Andros Sport', role: 'Motion design', client: 'Andros' },
      { id: '1186211881', title: 'Aftermovie Congr\u00e8s des experts-comptables 2025', role: 'Captation vid\u00e9o \u00b7 Montage', client: 'Staff & Go' },
    ];

    function initProjectsShowcase() {
      const grid = document.getElementById('projects-grid');
      if (!grid) return;

      // Generate card HTML for all 9 projects (synchronous — DOM first, thumbnails async)
      grid.innerHTML = PROJECTS.map((proj, i) => `
        <div class="project-card" data-vimeo-id="${proj.id}" data-index="${i}" tabindex="0" role="button" aria-label="${proj.title}">
          <img class="project-thumb" src="" alt="${proj.title}" loading="lazy">
          <div class="project-overlay">
            <div class="project-overlay-head">
              <div class="project-overlay-title">${proj.title}</div>
              <div class="project-overlay-client">${proj.client}</div>
            </div>
            <div class="project-overlay-role">${proj.role}</div>
          </div>
        </div>
      `).join('');

      // Fetch thumbnails via oEmbed in parallel (non-blocking, graceful fallback)
      fetchThumbnails();

      // Set up IntersectionObserver for lazy-load readiness
      setupCardObserver();
      setupCardInteractions();   // Hover preview, click, keyboard, mobile double-tap
      setupLightboxListeners();  // X button, backdrop click, Escape key
    }

    async function fetchThumbnails() {
      const requests = PROJECTS.map(p => {
        const pageUrl = `https://vimeo.com/${p.id}${p.hash ? '/' + p.hash : ''}`;
        return fetch(`https://vimeo.com/api/oembed.json?url=${encodeURIComponent(pageUrl)}&width=640`)
          .then(r => r.json())
          .then(data => ({ id: p.id, url: data.thumbnail_url, w: data.width, h: data.height }))
          .catch(() => ({ id: p.id, url: null }));
      });
      const results = await Promise.all(requests);
      results.forEach(({ id, url, w, h }) => {
        if (!url) return;
        const isVertical = w && h && h > w;
        document.querySelectorAll(`[data-vimeo-id="${id}"]`).forEach(card => {
          const thumb = card.querySelector('.project-thumb');
          if (thumb) thumb.src = url;
          // Vertical thumbnails: show full image (contain) over a blurred fill
          if (isVertical) {
            card.classList.add('is-vertical');
            let blur = card.querySelector('.project-thumb-blur');
            if (!blur) {
              blur = document.createElement('img');
              blur.className = 'project-thumb-blur';
              blur.setAttribute('aria-hidden', 'true');
              blur.loading = 'lazy';
              card.insertBefore(blur, card.firstChild);
            }
            blur.src = url;
          }
        });
      });
    }

    function setupCardObserver() {
      const cardObserver = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            entry.target.dataset.nearViewport = 'true';
            cardObserver.unobserve(entry.target);
          }
        });
      }, { rootMargin: '200px' });

      document.querySelectorAll('.project-card').forEach(card => cardObserver.observe(card));
    }

    // ─── Projects Interaction ───────────────────────────────────────────────────
    let activePlayer = null;
    let hoverTimeouts = new Map(); // debounce per card

    function buildPreviewSrc(vimeoId) {
      const base = `https://player.vimeo.com/video/${vimeoId}`;
      if (VIMEO_PAID) return `${base}?background=1`;
      return `${base}?autoplay=1&muted=1&loop=1&title=0&byline=0&portrait=0`;
    }

    function setupCardInteractions() {
      const cards = document.querySelectorAll('.project-card');
      const isTouchDevice = 'ontouchstart' in window || navigator.maxTouchPoints > 0;
      const prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

      cards.forEach(card => {
        // ── Desktop click: open lightbox ──
        card.addEventListener('click', (e) => {
          if (isTouchDevice) return; // handled by touchstart
          openLightbox(card.dataset.vimeoId, parseInt(card.dataset.index));
        });

        // ── Keyboard: Enter/Space opens lightbox ──
        card.addEventListener('keydown', (e) => {
          if (e.key === 'Enter' || e.key === ' ') {
            e.preventDefault();
            openLightbox(card.dataset.vimeoId, parseInt(card.dataset.index));
          }
        });

        // ── Mobile double-tap (D-15): distinguish a real tap from a scroll so the
        //    page never gets scroll-locked. touchstart/move stay passive (scroll
        //    unblocked); only a genuine tap acts, on touchend. ──
        let tapStartX = 0, tapStartY = 0, tapMoved = false;
        card.addEventListener('touchstart', (e) => {
          if (!isTouchDevice) return;
          const t = e.touches[0];
          tapStartX = t.clientX; tapStartY = t.clientY; tapMoved = false;
        }, { passive: true });

        card.addEventListener('touchmove', (e) => {
          if (!isTouchDevice) return;
          const t = e.touches[0];
          if (Math.abs(t.clientX - tapStartX) > 8 || Math.abs(t.clientY - tapStartY) > 8) {
            tapMoved = true; // it's a scroll, not a tap
          }
        }, { passive: true });

        card.addEventListener('touchend', (e) => {
          if (!isTouchDevice) return;
          if (tapMoved) return; // was a scroll — let the page scroll normally
          // Genuine tap: preventDefault suppresses the synthetic click + sticky :hover
          e.preventDefault();
          if (!card.classList.contains('touch-revealed')) {
            document.querySelectorAll('.project-card.touch-revealed')
              .forEach(c => c.classList.remove('touch-revealed'));
            card.classList.add('touch-revealed'); // first tap → reveal info
          } else {
            openLightbox(card.dataset.vimeoId, parseInt(card.dataset.index)); // second tap → open
          }
        }, { passive: false });
      });

      // Tap outside any card removes touch-revealed state
      document.addEventListener('touchstart', (e) => {
        if (!e.target.closest('.project-card')) {
          document.querySelectorAll('.project-card.touch-revealed').forEach(c => {
            c.classList.remove('touch-revealed');
            const iframe = c.querySelector('.project-preview');
            if (iframe) iframe.remove();
          });
        }
      }, { passive: true });
    }

    async function openLightbox(vimeoId, projectIndex) {
      const proj = PROJECTS[projectIndex];
      if (!proj) return;

      // Remove any hover preview iframe from the clicked card (prevents audio bleed — anti-pattern #1)
      const clickedCard = document.querySelector(`[data-index="${projectIndex}"]`);
      if (clickedCard) {
        const previewIframe = clickedCard.querySelector('.project-preview');
        if (previewIframe) previewIframe.remove();
      }

      const wrap = document.getElementById('lightbox-player-wrap');
      wrap.innerHTML = ''; // Clear any previous player

      // Create Vimeo player via SDK (use full url for private/hashed videos)
      const playerOpts = { responsive: true, playsinline: true };
      if (proj.hash) playerOpts.url = `https://vimeo.com/${proj.id}/${proj.hash}`;
      else playerOpts.id = parseInt(proj.id);
      activePlayer = new Player(wrap, playerOpts);

      // Populate metadata (D-11: title + role + client below player, D-18: client only in lightbox)
      document.getElementById('lightbox-meta').innerHTML = `
        <p class="lightbox-title">${proj.title}</p>
        <p class="lightbox-role">${proj.role}</p>
        <p class="lightbox-client">${proj.client}</p>
      `;

      // Show lightbox (remove hidden first, then add is-open on next frame for CSS transition)
      const lightbox = document.getElementById('lightbox');
      // Tag vertical videos so the player can be sized down on desktop
      lightbox.classList.toggle('is-vertical', !!(clickedCard && clickedCard.classList.contains('is-vertical')));
      lightbox.removeAttribute('hidden');
      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          lightbox.classList.add('is-open');
        });
      });

      // Lock body scroll
      document.body.style.overflow = 'hidden';

      // Move focus to close button for a11y
      document.getElementById('lightbox-close').focus();

      // Store which card opened the lightbox for focus return
      lightbox._triggerCard = clickedCard;
    }

    async function closeLightbox() {
      // Pause and destroy player (always before removing DOM — anti-pattern #3)
      if (activePlayer) {
        try {
          await activePlayer.pause();
        } catch (_) { /* iframe may already be gone */ }
        try {
          activePlayer.destroy();
        } catch (_) { /* safe cleanup */ }
        activePlayer = null;
      }

      // Clear player wrap
      document.getElementById('lightbox-player-wrap').innerHTML = '';
      document.getElementById('lightbox-meta').innerHTML = '';

      const lightbox = document.getElementById('lightbox');
      lightbox.classList.remove('is-open');

      // Wait for fade-out transition, then hide
      setTimeout(() => {
        lightbox.setAttribute('hidden', '');
      }, 350);

      // Restore body scroll (anti-pattern #4: always restore)
      document.body.style.overflow = '';

      // Clear any revealed cards so none stay "open" after quitting a video
      document.querySelectorAll('.project-card.touch-revealed')
        .forEach(c => c.classList.remove('touch-revealed'));

      // Return focus to triggering card
      if (lightbox._triggerCard) {
        lightbox._triggerCard.focus();
        lightbox._triggerCard = null;
      }
    }

    function setupLightboxListeners() {
      // Close button (D-12)
      document.getElementById('lightbox-close').addEventListener('click', closeLightbox);

      // Backdrop click (D-12)
      document.getElementById('lightbox-backdrop').addEventListener('click', closeLightbox);

      // Escape key (a11y — Claude's discretion, per UI-SPEC accessibility contract)
      document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') {
          const lightbox = document.getElementById('lightbox');
          if (lightbox && lightbox.classList.contains('is-open')) {
            closeLightbox();
          }
        }
      });
    }

    // ─── Contact Form ─────────────────────────────────────────────────────────
    function initContactForm() {
      const form = document.getElementById('contact-form');
      if (!form) return;

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        const feedback = document.getElementById('form-feedback');
        const submitBtn = form.querySelector('.contact-submit');

        // Clear previous feedback (Pitfall 4)
        feedback.textContent = '';
        feedback.className = 'form-feedback';

        // Disable button during submission
        submitBtn.disabled = true;
        submitBtn.textContent = 'Envoi...';

        try {
          const response = await fetch(form.action, {
            method: 'POST',
            body: new FormData(form),
            headers: { 'Accept': 'application/json' }
          });

          if (response.ok) {
            feedback.textContent = 'Message envoy\u00e9 ! Je vous r\u00e9ponds rapidement.';
            feedback.className = 'form-feedback form-feedback--success';
            form.reset();
          } else {
            const json = await response.json().catch(() => ({}));
            const msg = json.errors?.map(err => err.message).join(', ') || 'Une erreur est survenue.';
            feedback.textContent = msg;
            feedback.className = 'form-feedback form-feedback--error';
          }
        } catch {
          feedback.textContent = 'Erreur r\u00e9seau. Veuillez r\u00e9essayer.';
          feedback.className = 'form-feedback form-feedback--error';
        } finally {
          submitBtn.disabled = false;
          submitBtn.textContent = 'Envoyer';
        }
      });
    }

    // ─── Scroll Integration ──────────────────────────────────────────────────
    function initScrollIntegration() {
      const backToTopBtn = document.getElementById('back-to-top');

      // Track A: CSS-driven (canvas parallax + fade, CTA fade)
      const heroTl = gsap.timeline({
        scrollTrigger: {
          trigger: '#hero',
          start: 'top top',
          end: 'bottom top',
          scrub: true,
        }
      });

      // Hold zone: ~8% of scroll = brief pause before transition starts
      heroTl.to({}, { duration: 0.08 });

      // Canvas parallax: translateY -50vh (desktop only — mobile skip to avoid zoom glitch)
      if (!window.matchMedia('(max-width: 767px)').matches) {
        heroTl.to('#canvas', { y: '-50vh', ease: 'none', duration: 0.92 }, 0.08);
      }

      // Canvas fade to invisible
      heroTl.to('#canvas', { opacity: 0, ease: 'power2.in', duration: 0.92 }, 0.08);

      // CTA button fade out by 30% of scroll
      heroTl.to('#cta-btn', { opacity: 0, pointerEvents: 'none', ease: 'power1.out', duration: 0.22 }, 0.08);

      // Track B: Three.js mutations via onUpdate
      ScrollTrigger.create({
        trigger: '#hero',
        start: 'top top',
        end: 'bottom top',
        scrub: true,
        onUpdate: (self) => {
          const progress = self.progress;

          // Glass text Z recession: 3 -> -2 (5 units back), gated on entrance complete
          if (glassGroup && entranceComplete) {
            glassGroup.position.z = 3 - progress * 5;
          }

          // Tile spread uniform
          if (tilesMesh) {
            tilesMesh.material.uniforms.uScrollProgress.value = progress;
          }

          // RAF optimization: stop when canvas invisible
          if (progress > 0.95 && rafId !== null) {
            stopRAFLoop();
          } else if (progress <= 0.95 && rafId === null && !document.hidden) {
            startRAFLoop();
          }

          // Back-to-top button visibility — appears after hero scroll-out
          if (progress > 0.95) {
            backToTopBtn.classList.add('is-visible');
          } else {
            backToTopBtn.classList.remove('is-visible');
          }
        }
      });

      // Future phases: call ScrollTrigger.refresh() after adding section content

      // CTA button click — smooth scroll to first content section
      document.getElementById('cta-btn').addEventListener('click', () => {
        const firstSection = document.querySelector('.content-section');
        if (firstSection) firstSection.scrollIntoView({ behavior: 'smooth' });
      });

      // Back-to-top button click — smooth scroll to page top
      backToTopBtn.addEventListener('click', () => {
        window.scrollTo({ top: 0, behavior: 'smooth' });
      });

      // Initialize projects grid (must happen before section observer)
      initProjectsShowcase();
      initContactForm();

      // Content section entrance animations (IntersectionObserver, play once)
      const sectionObserver = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            entry.target.classList.add('is-visible');
            sectionObserver.unobserve(entry.target);
          }
        });
      }, { threshold: 0.1 });

      document.querySelectorAll('.content-section').forEach(el => {
        sectionObserver.observe(el);
      });

      // Recalculate ScrollTrigger positions after projects content is injected
      if (typeof ScrollTrigger !== 'undefined') {
        ScrollTrigger.refresh();
      }
    }

    // ─── Bootstrap ────────────────────────────────────────────────────────────
    async function main() {
      gpuTier = await detectTier();
      initRenderer();
      registerContextHandlers();
      initScene();
      setupEnvMap();
      setupLighting();
      initFluidSim();
      initRenderTargets();

      // Start RAF loop early (needed for compileAsync)
      startRAFLoop();

      // Initialize scroll integration (ScrollTrigger + CTA + section observers)
      initScrollIntegration();

      console.log('[Hero] GPU tier:', gpuTier, '| Three.js r' + THREE.REVISION, '| mobile:', isMobile);

      // Start loading screen
      const revealDone = initLoadingScreen(gpuTier);

      // Wait for Inter font to be loaded before canvas rendering
      await document.fonts.ready;

      // Build scene in parallel with loading screen
      const noiseTex = createNoiseTexture();

      // Quad-tree tiles
      const tiles = generateQuadTree(isMobile);
      buildTiles(tiles, noiseTex);
      // buildCornerLinks(tiles);

      // "Tom Bernys" text behind glass
      buildBehindText();

      // Load font + build glass text
      const font = await new FontLoader().loadAsync('https://cdn.jsdelivr.net/npm/three@0.175.0/examples/fonts/helvetiker_bold.typeface.json');
      loadedFont = font;
      buildGlassText(font);

      // Init bloom
      initBloom(window.innerWidth, window.innerHeight);

      // Compile shaders
      await renderer.compileAsync(scene, camera);

      sceneReady = true;

      // Wait for loader reveal + fallback
      const fallback = new Promise(r => setTimeout(r, 5000));
      await Promise.race([
        Promise.all([revealDone]),
        fallback
      ]);

      transition();
    }

    main();
  </script>
